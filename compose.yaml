services:
  db:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: pgvector-db
    restart: always
    environment:
      POSTGRES_USER: graduser
      POSTGRES_PASSWORD: graduser
      POSTGRES_DB: graddb
      # 운영이면 아래 trust 는 제거하세요
      # POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - /Users/imseongpyo/Desktop/graddb_local:/var/lib/postgresql/data
    networks:
      - kokeybert
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graduser -d graddb || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./front_end
      dockerfile: Dockerfile
    container_name: react-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./front_end:/app
      - /app/node_modules
    networks:
      - kokeybert

  backend:
    build:
      context: ./back_end
      dockerfile: Dockerfile
    container_name: fastapi-backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # dev에선 굳이 sleep 불필요 (DB healthcheck가 대신 보장)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    # ❗모델을 이미지에 구웠으니 코드/전체 덮어쓰기 금지
    # volumes:
    #   - ./back_end/app:/app/app
    #   - ./front_end/dist:/app/app/static   # dist가 실제 있으면만 사용
    networks:
      - kokeybert

networks:
  kokeybert:
    driver: bridge